name: LLMHub
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"

packages:
  runanywhere-sdks:
    url: https://github.com/RunanywhereAI/runanywhere-sdks
    exact: 0.19.6

targets:
  LLMHub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/LLMHub
        excludes:
          - check_strings.py
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.LLMHub
        PRODUCT_NAME: LLMHub
        SWIFT_VERSION: 6.0
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_KEY_CFBundleDisplayName: LLMHub
        INFOPLIST_KEY_NSMicrophoneUsageDescription: LLM Hub uses your microphone to transcribe speech on-device.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: LLM Hub uses speech recognition to transcribe your audio on-device.
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: runanywhere-sdks
        product: RunAnywhere
      - package: runanywhere-sdks
        product: RunAnywhereLlamaCPP
      - package: runanywhere-sdks
        product: RunAnywhereONNX
      - sdk: Accelerate.framework
