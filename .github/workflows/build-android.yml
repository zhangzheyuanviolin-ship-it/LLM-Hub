name: Build Android APK (Full Assets)

on:
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
        cache-disabled: false

    - name: Create local.properties
      run: |
        echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" > android/local.properties
        echo "DEBUG_PREMIUM=false" >> android/local.properties
        cat android/local.properties

    - name: Merge Asset Pack assets into main app module
      run: |
        echo "Merging qnnlibs..."
        if [ -d "android/qnn_pack/src/main/assets/qnnlibs" ]; then
          mkdir -p android/app/src/main/assets/qnnlibs
          cp -rv android/qnn_pack/src/main/assets/qnnlibs/. android/app/src/main/assets/qnnlibs/
        fi
        
        echo "Merging cvtbase..."
        if [ -d "android/sd_pack/src/main/assets/cvtbase" ]; then
          mkdir -p android/app/src/main/assets/cvtbase
          cp -rv android/sd_pack/src/main/assets/cvtbase/. android/app/src/main/assets/cvtbase/
        fi
        
        echo "Extracting NPU assets from Nexa AAR..."
        mkdir -p android/app/src/main/assets/npu
        cd android
        wget -q https://repo1.maven.org/maven2/ai/nexa/core/0.0.24/core-0.0.24.aar -O /tmp/nex.aar || echo "Download failed"
        if [ -f /tmp/nex.aar ]; then
          cd /tmp
          unzip -q -o nex.aar "assets/npu/*" -d npu_extract || true
          if [ -d "npu_extract/assets/npu" ]; then
            cp -rv npu_extract/assets/npu/. /workspace/android/app/src/main/assets/npu/ 2>/dev/null || cp -rv npu_extract/assets/npu/. android/app/src/main/assets/npu/
          fi
          cd /workspace
        fi
        
        echo "Asset merge complete"
        ls -la android/app/src/main/assets/

    - name: Build Full APK with all assets
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK: $APK_PATH"
        ls -lh "$APK_PATH"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LLM-Hub-full-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30
        if-no-files-found: error
