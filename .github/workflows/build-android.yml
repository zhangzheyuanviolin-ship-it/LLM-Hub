name: Build Android APK

on:
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    - name: Create local.properties
      run: |
        echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" > android/local.properties
        echo "DEBUG_PREMIUM=false" >> android/local.properties
        cat android/local.properties

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

    - name: List APK files
      run: |
        echo "=== Looking for APK files ==="
        find android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "Directory not found"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: android/build.log
        retention-days: 7

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LLM-Hub-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30