name: Build Android APK (Full Assets)

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Version suffix (e.g., cn-full)'
        required: false
        default: 'cn-full'

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
        cache-disabled: false

    - name: Create local.properties
      run: |
        echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" > android/local.properties
        echo "DEBUG_PREMIUM=false" >> android/local.properties
        cat android/local.properties

    - name: Merge Asset Pack assets into main app module
      run: |
        # Copy qnnlibs from qnn_pack to app/src/main/assets
        if [ -d "android/qnn_pack/src/main/assets/qnnlibs" ]; then
          mkdir -p android/app/src/main/assets/qnnlibs
          cp -rv android/qnn_pack/src/main/assets/qnnlibs/* android/app/src/main/assets/qnnlibs/
        fi
        
        # Copy cvtbase from sd_pack to app/src/main/assets
        if [ -d "android/sd_pack/src/main/assets/cvtbase" ]; then
          mkdir -p android/app/src/main/assets/cvtbase
          cp -rv android/sd_pack/src/main/assets/cvtbase/* android/app/src/main/assets/cvtbase/
        fi
        
        # Extract and copy npu assets from Nexa AAR
        mkdir -p android/app/src/main/assets/npu
        cd android
        # Download Nexa AAR and extract npu assets
        wget -q https://github.com/NexaAI/core/releases/download/v0.0.24/core-0.0.24.aar -O /tmp/nex.aar || true
        if [ -f /tmp/nex.aar ]; then
          cd /tmp
          unzip -q -o nex.aar "assets/npu/htp-files-v*" -d npu_extract
          if [ -d "npu_extract/assets/npu" ]; then
            cp -rv npu_extract/assets/npu/* /workspace/android/app/src/main/assets/npu/
          fi
        fi
        cd /workspace

    - name: Build Full APK with all assets
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK: $APK_PATH"
        ls -lh "$APK_PATH"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LLM-Hub-full-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30
        if-no-files-found: error

    - name: Build Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Build completed successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### APK Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Path**: \`android/app/build/outputs/apk/release/app-release.apk\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Download**: Check the Artifacts section above" >> $GITHUB_STEP_SUMMARY
        echo "- **Retention**: 30 days" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Configuration" >> $GITHUB_STEP_SUMMARY
        echo "- Asset Packs: Merged into APK" >> $GITHUB_STEP_SUMMARY
        echo "- Includes: qnnlibs, cvtbase, npu HTP files" >> $GITHUB_STEP_SUMMARY
        echo "- Architecture: arm64-v8a only" >> $GITHUB_STEP_SUMMARY
        echo "- Version: 3.7.1 (versionCode 93)" >> $GITHUB_STEP_SUMMARY
