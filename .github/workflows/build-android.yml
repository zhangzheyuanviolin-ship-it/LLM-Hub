name: Build Android APK (Full Assets)

on:
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    - name: Create local.properties
      run: |
        echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" > android/local.properties
        echo "DEBUG_PREMIUM=false" >> android/local.properties
        cat android/local.properties

    - name: Pre-create asset directories
      run: |
        mkdir -p android/qnn_pack/src/main/assets/qnnlibs
        mkdir -p android/sd_pack/src/main/assets/cvtbase
        mkdir -p android/nexa_npu_pack/src/main/assets/npu

    - name: Build Full APK with all assets
      run: |
        cd android
        chmod +x gradlew
        # Build APK with all Asset Pack assets merged into base module
        ./gradlew assembleRelease -PincludeAssetPackFiles -PexcludeAssetPackFiles --no-daemon --stacktrace

    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK: $APK_PATH"
        ls -lh "$APK_PATH"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LLM-Hub-full-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30
        if-no-files-found: error